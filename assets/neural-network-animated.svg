<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="nodeGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="55%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .card { fill: #11131c; stroke: #22263a; stroke-width: 1; }

      .flow-line {
        fill: none;
        stroke: url(#lineGrad);
        stroke-width: 1.4;
        stroke-dasharray: 5 9;
        opacity: 0.55;
        animation: flow 2.6s linear infinite;
      }
      @keyframes flow {
        to { stroke-dashoffset: -140; }
      }

      .node {
        fill: url(#nodeGrad);
        filter: url(#glow);
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 2.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.9); opacity: 0.8; }
        50%      { transform: scale(1.18); opacity: 1; }
      }

      .n0 { animation-delay: 0s;    }
      .n1 { animation-delay: .2s;  }
      .n2 { animation-delay: .4s;  }
      .n3 { animation-delay: .6s;  }
      .n4 { animation-delay: .8s;  }
      .n5 { animation-delay: 1.0s; }
      .n6 { animation-delay: 1.2s; }
      .n7 { animation-delay: 1.4s; }

      .label {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        fill: #C4B5FD;
        font-size: 13px;
        letter-spacing: 1px;
      }
      .sublabel {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        fill: #8B8FA3;
        font-size: 11px;
      }

      .pulse-dot {
        fill: #E9E3FF;
        filter: url(#glow);
      }
    </style>
  </defs>

  <!-- card background -->
  <rect class="card" x="1" y="1" width="898" height="418" rx="14"/>

  <!-- ===== connections: input -> hidden ===== -->
  <g>
    <path id="p0" class="flow-line" d="M120,70 L430,40"/>
    <path id="p1" class="flow-line" d="M120,70 L430,115"/>
    <path id="p2" class="flow-line" d="M120,70 L430,190"/>
    <path class="flow-line" d="M120,150 L430,40"/>
    <path id="p3" class="flow-line" d="M120,150 L430,115"/>
    <path class="flow-line" d="M120,150 L430,190"/>
    <path class="flow-line" d="M120,150 L430,265"/>
    <path class="flow-line" d="M120,240 L430,115"/>
    <path id="p4" class="flow-line" d="M120,240 L430,190"/>
    <path class="flow-line" d="M120,240 L430,265"/>
    <path class="flow-line" d="M120,240 L430,340"/>
    <path class="flow-line" d="M120,330 L430,190"/>
    <path id="p5" class="flow-line" d="M120,330 L430,265"/>
    <path class="flow-line" d="M120,330 L430,340"/>
  </g>

  <!-- ===== connections: hidden -> output ===== -->
  <g>
    <path id="p6" class="flow-line" d="M450,40 L760,130"/>
    <path class="flow-line" d="M450,40 L760,220"/>
    <path class="flow-line" d="M450,115 L760,130"/>
    <path id="p7" class="flow-line" d="M450,115 L760,220"/>
    <path class="flow-line" d="M450,190 L760,130"/>
    <path class="flow-line" d="M450,190 L760,220"/>
    <path id="p8" class="flow-line" d="M450,190 L760,310"/>
    <path class="flow-line" d="M450,265 L760,220"/>
    <path class="flow-line" d="M450,265 L760,310"/>
    <path id="p9" class="flow-line" d="M450,340 L760,220"/>
    <path class="flow-line" d="M450,340 L760,310"/>
  </g>

  <!-- traveling pulse dots along a few representative paths -->
  <circle class="pulse-dot" r="2.6">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="0s">
      <mpath xlink:href="#p1"/>
    </animateMotion>
  </circle>
  <circle class="pulse-dot" r="2.6">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin=".4s">
      <mpath xlink:href="#p3"/>
    </animateMotion>
  </circle>
  <circle class="pulse-dot" r="2.6">
    <animateMotion dur="2.1s" repeatCount="indefinite" begin=".8s">
      <mpath xlink:href="#p5"/>
    </animateMotion>
  </circle>
  <circle class="pulse-dot" r="2.6">
    <animateMotion dur="2.3s" repeatCount="indefinite" begin="1.1s">
      <mpath xlink:href="#p6"/>
    </animateMotion>
  </circle>
  <circle class="pulse-dot" r="2.6">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="1.5s">
      <mpath xlink:href="#p8"/>
    </animateMotion>
  </circle>
  <circle class="pulse-dot" r="2.6">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="1.9s">
      <mpath xlink:href="#p9"/>
    </animateMotion>
  </circle>

  <!-- ===== input layer nodes ===== -->
  <circle class="node n0" cx="120" cy="70"  r="10"/>
  <circle class="node n1" cx="120" cy="150" r="10"/>
  <circle class="node n2" cx="120" cy="240" r="10"/>
  <circle class="node n3" cx="120" cy="330" r="10"/>

  <!-- ===== hidden / attention layer nodes ===== -->
  <circle class="node n4" cx="430" cy="40"  r="10"/>
  <circle class="node n5" cx="430" cy="115" r="10"/>
  <circle class="node n6" cx="430" cy="190" r="10"/>
  <circle class="node n7" cx="430" cy="265" r="10"/>
  <circle class="node n0" cx="430" cy="340" r="10"/>

  <!-- ===== output layer nodes ===== -->
  <circle class="node n2" cx="760" cy="130" r="10"/>
  <circle class="node n5" cx="760" cy="220" r="10"/>
  <circle class="node n7" cx="760" cy="310" r="10"/>

  <!-- ===== labels ===== -->
  <text class="label" x="70"  y="378" text-anchor="middle">ENCODER</text>
  <text class="label" x="440" y="378" text-anchor="middle">SELF-ATTENTION</text>
  <text class="label" x="760" y="378" text-anchor="middle">DECODER</text>

  <text class="sublabel" x="70"  y="398" text-anchor="middle">Token Embed + Positional</text>
  <text class="sublabel" x="440" y="398" text-anchor="middle">Multi-Head Attn (Q, K, V)</text>
  <text class="sublabel" x="760" y="398" text-anchor="middle">Output Probs (Softmax)</text>
</svg>
